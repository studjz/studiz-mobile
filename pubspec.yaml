name: studiz_mobile
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2906.0

  go_router: ^17.0.0

  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  riverpod_lint: ^3.0.3

  build_runner: ^2.7.1

  riverpod_generator: ^3.0.3

  freezed: ^3.2.3
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/pretendard_regular.ttf
          weight: 400
        - asset: assets/fonts/pretendard_medium.ttf
          weight: 500
        - asset: assets/fonts/pretendard_semibold.ttf
          weight: 600
